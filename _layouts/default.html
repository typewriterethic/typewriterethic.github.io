<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} – {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>

  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | truncate: 160 }}">
  <meta name="author" content="{{ site.author }}">

  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | truncate: 160 }}">
  <meta property="og:url" content="{{ page.url | prepend: site.url }}">
  <meta property="og:site_name" content="{{ site.title }}">
  {% if page.og_image %}
  <meta property="og:image" content="{{ page.og_image | prepend: site.url }}">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  {% endif %}

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta name="twitter:description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | truncate: 160 }}">
  {% if page.og_image %}
  <meta name="twitter:image" content="{{ page.og_image | prepend: site.url }}">
  {% endif %}

  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | prepend: site.url }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="canonical" href="{{ page.url | prepend: site.url }}">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
</head>
<body>

  <div class="site-wrapper">

    <header class="site-header">
      <div class="site-header__inner">
        <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
        <nav class="site-nav">
          <a href="{{ '/archive/' | relative_url }}">Archive</a>
          <a href="{{ '/about/' | relative_url }}">About</a>
        </nav>
        <button class="hamburger" onclick="toggleNav()" aria-label="Menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="nav-dropdown" id="nav-dropdown">
          <a href="{{ '/archive/' | relative_url }}">Archive</a>
          <a href="{{ '/about/' | relative_url }}">About</a>
        </div>
      </div>
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <p>{{ site.title }}</p>
        <p><a href="mailto:{{ site.email }}">{{ site.email }}</a></p>
      </div>
    </footer>

  </div>

<script>
function toggleNav() {
  var d = document.getElementById('nav-dropdown');
  d.classList.toggle('open');
}
document.addEventListener('click', function(e) {
  var d = document.getElementById('nav-dropdown');
  if (d && !d.contains(e.target) && !e.target.closest('.hamburger')) {
    d.classList.remove('open');
  }
});
</script>
</body>
</html>
